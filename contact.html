<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <title>Contato - Jhonatan Machado</title>

        <link rel="stylesheet" href="/content/css/reset.css">
        <link rel="stylesheet" href="/content/css/style.css">
        <link rel="stylesheet" href="/content/css/contact.css">

        <script src="/content/js/include.js"></script>
    </head>
    <body>
        <header w3-include-html="/content/include/header.html"></header>
        <main>
            <section class="contato">
                <h2>Contato</h2>
                <div class="meiosContato">
                    <h3>Meios de contato</h3>
                    <div class="item">
                        <img src="/content/icon/phone.svg" alt="Icon phone">
                        <p>Telefone: <a href="tel:+5519999722601">(19) 99972-2601</a></p>
                    </div>
                    <div class="item">
                        <img src="/content/icon/whatsapp.svg" alt="Icon WhatsApp">
                        <p>WhatsApp: <a href="https://wa.me/5519999722601">(19) 99972-2601</a></p>
                    </div>
                    <div class="item">
                        <img src="/content/icon/envelope.svg" alt="Icon envelope">
                        <p>E-mail: <a href="mailto:jhonatanmansueto@gmail.com">jhonatanmansueto@gmail.com</a></p>
                    </div>
                </div>
                <div class="formulario">
                    <h3>Enviar email</h3>
                    <form action="/content/php/sendmail.php" method="post" target="_blank">
                        <div>
                            <label for="fullname">Nome completo:</label>
                            <input type="text" name="fullname" id="fullname" required>
                        </div>
                        <div>
                            <label for="mail">Email:</label>
                            <input type="email" name="mail" id="mail" required>
                        </div>
                        <div>
                            <label for="phone">Telefone:</label>
                            <input type="tel" name="phone" id="phone" pattern="[0-9]{2}-[0-9]{5}-[0-9]{4}" placeholder="xx-xxxxx-xxxx">
                        </div>
                        <div>
                            <label for="subject">Assunto:</label>
                            <input type="text" name="subject" id="subject" required>
                        </div>
                        <div>
                            <label for="message">Mensagem:</label>
                            <textarea name="message" id="message" cols="30" rows="10" required></textarea>
                        </div>
                        <input type="submit" value="Enviar">
                    </form>
                </div>
            </section>
        </main>
        <footer w3-include-html="/content/include/footer.html"></footer>
        <section class="linkWhatsapp">
            <a href="https://wa.me/5519999722601"><img src="/content/icon/whatsappBranco.svg" alt="Link de contato pelo Whatsapp"> Converse via WhatsApp</a>
        </section>
        <script>
            includeHTML();
        </script>
    </body>
</html>
